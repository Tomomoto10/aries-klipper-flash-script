[mcu]
serial: /dev/ttyUSB0
restart_method: command
 
[printer]
kinematics: cartesian
max_velocity: 1000
max_accel: 7000
max_z_velocity: 30
max_z_accel: 100
 
[force_move]
enable_force_move: true
 
[virtual_sdcard]
path: ~/printer_data/gcodes

[stepper_x]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC13
microsteps: 16
rotation_distance: 34
endstop_pin: !PC15
position_endstop: 205.5
position_max: 205.5
homing_speed: 100
second_homing_speed: 5
 
[stepper_y]
step_pin: PB6
dir_pin: PB5
enable_pin: !PC13
microsteps: 16
rotation_distance: 34
endstop_pin: !PA6
position_max: 205.5
position_endstop: 205.5
homing_speed: 100
second_homing_speed: 5
 
[stepper_z]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC13
microsteps: 16
rotation_distance: 8
endstop_pin: !PA7
#ADJUST 2 VALUES BELOW WITH COMMAND: Z_ENDSTOP_CALIBRATE
position_endstop: 216.3
position_max: 216.5
homing_speed: 25
second_homing_speed: 5

[bed_screws]
screw1: 118, 220
screw2: 45, 25
screw3: 210, 25 
 
[extruder]
step_pin: PC14
dir_pin: PB9
enable_pin: !PC13
microsteps: 16
rotation_distance: 32.5
nozzle_diameter: 0.400
filament_diameter: 1.75
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA4
control: pid
pid_Kp: 29.460
pid_Ki: 2.067
pid_Kd: 104.952
min_temp: 0
max_temp: 250
min_extrude_temp: 150
 
[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PA5
control: pid
pid_Kp: 57.069
pid_Ki: 1.469
pid_Kd: 554.286
min_temp: 0
max_temp: 110
 
[fan]
pin: PC2
 
[heater_fan heatbreak_cooling_fan]
pin: PC3
heater: extruder
fan_speed: 0.75
 
[led extruder_led]
white_pin: PC1

#CHASSIS LEDS
[neopixel chassis_lights]
pin: PA15
chain_count: 1   # NUMBER_OF_LEDS_HERE
color_order: GRB # depends on strip
initial_RED: 1   # if you want
initial_GREEN: 1 # if you want
initial_BLUE: 1  # if you want
 
[filament_switch_sensor runout_sensor]
pause_on_runout: True
debounce_delay: 1
switch_pin: PC0
 
[controller_fan mcu_fan1]
pin: PA3
max_power: 1
stepper: stepper_x, stepper_y, stepper_z
heater: heater_bed, extruder
#unused fan FAN1 pin is PA0


#MACROS
 
[display_status]
 
[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
 
[pause_resume]
 
[gcode_macro PAUSE]
description: Pause the actual running print
rename_existing: PAUSE_BASE
# change this if you need more or less extrusion
variable_extrude: 1.0
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  ##### set park positon for x and y #####
  # default is your max posion from your printer.cfg
  {% set x_park = printer.toolhead.axis_maximum.x|float - 5.0 %}
  {% set y_park = printer.toolhead.axis_maximum.y|float - 5.0 %}
  ##### calculate save lift position #####
  {% set max_z = printer.toolhead.axis_maximum.z|float %}
  {% set act_z = printer.toolhead.position.z|float %}
  {% if act_z < (max_z - 2.0) %}
      {% set z_safe = 2.0 %}
  {% else %}
      {% set z_safe = max_z - act_z %}
  {% endif %}
  ##### end of definitions #####
  PAUSE_BASE
  G91
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G1 E-{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}
  {% if "xyz" in printer.toolhead.homed_axes %}
    G1 Z{z_safe} F900
    G90
    G1 X{x_park} Y{y_park} F6000
  {% else %}
    {action_respond_info("Printer not homed")}
  {% endif %} 
 
[gcode_macro RESUME]
description: Resume the actual running print
rename_existing: RESUME_BASE
gcode:
  ##### read E from pause macro #####
  {% set E = printer["gcode_macro PAUSE"].extrude|float %}
  #### get VELOCITY parameter if specified ####
  {% if 'VELOCITY' in params|upper %}
    {% set get_params = ('VELOCITY=' + params.VELOCITY)  %}
  {%else %}
    {% set get_params = "" %}
  {% endif %}
  ##### end of definitions #####
  {% if printer.extruder.can_extrude|lower == 'true' %}
    G91
    G1 E{E} F2100
  {% else %}
    {action_respond_info("Extruder not hot enough")}
  {% endif %}  
  RESUME_BASE {get_params}
 
[gcode_macro CANCEL_PRINT]
description: Cancel the actual running print
rename_existing: CANCEL_PRINT_BASE
gcode:
  TURN_OFF_HEATERS
  CANCEL_PRINT_BASE
 


[gcode_macro LOAD_FILAMENT]
variable_load_distance: 425
variable_purge_distance: 150
gcode:
 {% set speed = params.SPEED|default(300) %}
 {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 100
%}
 {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(230)|float %}
 SAVE_GCODE_STATE NAME=load_state
 #M300 #Beep
 G91 #Set incremental move mode
 G92 E0 #Reset extruder to position zero
 #Display message
 M117 Heating...
 M109 S{EXTRUDER_TEMP} #Heat hot end to 230 as default
 #M300 #Beep
 #Display message
 M117 Loading filament...
 G1 E{load_distance} F{max_velocity} #Fast load filament
 G1 E{purge_distance} F{speed} #Slow load filament
 #M300 #Beep
 #Display message
 M117 Filament loaded
 M109 S{0} #Turn off heat 
 RESTORE_GCODE_STATE NAME=load_state 


[gcode_macro UNLOAD_FILAMENT]
variable_unload_distance: 470
gcode:
 {% set speed = params.SPEED|default(300) %}
 {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity * 100
%}
 {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(230)|float %}
 SAVE_GCODE_STATE NAME=unload_state
 #M300 #Beep
 G91 #Set incremental move mode
 G92 E0 #Reset extruder to position zero
 #Display message
 M117 Heating...
 M109 S{EXTRUDER_TEMP} #Heat hot end to 230 as default
 #M300 #Beep
 #Display message
 M117 Unloading filament...
 G0 E10 F300 #Exrtude some filament
 G0 E5 F3600 #Push back filament to minimize stringing
 G0 E-15 F3600 #Quickly move filament in the cold zone
 G0 E-20 F300 #Continue extraction slowly to allow filament to cool
 G1 E-{unload_distance} F{max_velocity} #Fast unload
 #M300 #Beep
 #Display message
 M117 Filament unloaded
 M109 S{0} #Turn off heat
 RESTORE_GCODE_STATE NAME=unload_state 




